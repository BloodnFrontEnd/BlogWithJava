<div class="popup fixed w-full h-screen left-0 top-0 shadow-2xl backdrop-blur-xl z-99 flex items-center justify-center overflow-hidden">
  <div class="container flex items-center justify-center">
    <div class="popup-inner w-fit h-auto px-8 py-4 bg-white my-auto rounded-[12px]">
      <div class="header flex items-center justify-between">
        <h3 class="text-2xl text-center">{{title()}}</h3>
        <button (click)="close.emit()">X</button>
      </div>
      <ng-content />
    </div>
  </div>
</div>
